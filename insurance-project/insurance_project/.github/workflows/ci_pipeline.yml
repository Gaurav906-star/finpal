name: MobiShield CI Pipeline

on:
  push:
    branches: [main] # Run when code is pushed to main
  pull_request:
    branches: [main] # Run on every pull request targeting main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          # Install required packages from requirements.txt
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Inject Secret Key for Testing 🛡️
        env:
          SECRET_KEY_VALUE: ${{ secrets.SECRET_KEY_TESTING }}
        run: |
          # CORRECTED: Use standard shell variable substitution to export the secret.
          # This sets the DJANGO_SECRET_KEY as an environment variable for the next steps.
          echo "DJANGO_SECRET_KEY=${SECRET_KEY_VALUE}" >> $GITHUB_ENV

      - name: Run Django Migrations (Setup Database)
        run: python manage.py migrate --settings=insurance_project.settings.production

      - name: Run Unit Tests 🧪

        run: python manage.py test --settings=insurance_project.settings.production
